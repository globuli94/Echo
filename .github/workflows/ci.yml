name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Note: The acceptance criteria mention 'master' but the repo's primary branch is 'main'.
# This pipeline targets 'main'.

jobs:
  flutter-ci:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test
